<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hóa đơn | Galaxy Badminton</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#006b32",
            surface: "#fcf9f8",
            "on-surface": "#1c1b1b",
            "surface-container-low": "#f6f3f2",
            "outline-variant": "#bccabb"
          },
          fontFamily: { headline: ["Lexend", "sans-serif"], body: ["Inter", "sans-serif"] }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
  <header class="bg-surface flex justify-between items-center w-full px-8 py-4 fixed top-0 z-50 border-b border-outline-variant/20">
    <div class="flex items-center gap-8">
      <a href="index.html" class="text-2xl font-black tracking-tighter uppercase font-headline">Galaxy Badminton</a>
      <nav id="mainNav" class="hidden md:flex gap-6 items-center"></nav>
    </div>
    <div id="headerAuth" class="flex items-center gap-2 shrink-0"></div>
  </header>

  <main class="pt-24 pb-12 px-8 max-w-4xl mx-auto">
    <section class="bg-white rounded-2xl border border-outline-variant/20 shadow-sm p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="font-headline text-3xl font-extrabold tracking-tight">Hóa đơn thanh toán</h1>
          <p class="text-sm opacity-70">Thông tin xác nhận giao dịch đặt sân.</p>
        </div>
        <span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-bold uppercase">Đã thanh toán</span>
      </div>

      <div id="invoiceBody" class="mt-6 grid md:grid-cols-2 gap-4 text-sm">
        <p>Đang tải dữ liệu hóa đơn...</p>
      </div>

      <div class="mt-8 flex flex-wrap gap-3">
        <a id="detailLink" href="my-bookings.html" class="px-5 py-3 rounded-xl bg-primary text-white font-bold uppercase tracking-wider text-xs">Xem chi tiết đơn</a>
        <a href="my-bookings.html" class="px-5 py-3 rounded-xl bg-white border border-outline-variant/30 font-semibold text-sm">Đơn của tôi</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/ui/nav.js"></script>
  <script type="module" src="js/pages/invoice.js"></script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đơn đặt sân | Galaxy Badminton</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#006b32", surface: "#fcf9f8", "on-surface": "#1c1b1b", "surface-container-low": "#f6f3f2", "outline-variant": "#bccabb" },
          fontFamily: { headline: ["Lexend", "sans-serif"], body: ["Inter", "sans-serif"] }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
  <header class="bg-surface flex justify-between items-center w-full px-8 py-4 fixed top-0 z-50 border-b border-outline-variant/20">
    <div class="flex items-center gap-8">
      <a href="index.html" class="text-2xl font-black tracking-tighter uppercase font-headline">Galaxy Badminton</a>
      <nav id="mainNav" class="hidden md:flex gap-6 items-center"></nav>
    </div>
    <div id="headerAuth" class="flex items-center gap-2 shrink-0"></div>
  </header>

  <main class="pt-24 pb-12 px-8 max-w-7xl mx-auto">
    <section class="bg-surface-container-low rounded-2xl p-6 shadow-sm border border-outline-variant/20">
      <h1 class="font-headline text-3xl font-extrabold tracking-tight">Đơn đặt sân của tôi</h1>
      <p class="text-sm mt-1 opacity-70">Theo dõi lịch đặt sắp tới và lịch sử đã hoàn tất/hủy.</p>

      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mt-6 mb-5">
        <div class="inline-flex bg-white rounded-xl p-1 border border-outline-variant/30">
          <button id="tabUpcoming" class="px-5 py-2 rounded-lg text-sm font-headline font-bold bg-primary text-white">Sắp tới</button>
          <button id="tabHistory" class="px-5 py-2 rounded-lg text-sm font-headline font-semibold text-on-surface">Lịch sử</button>
        </div>
        <p id="bookingCount" class="text-sm opacity-70"></p>
      </div>

      <div class="bg-white rounded-2xl border border-outline-variant/20 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead class="bg-surface-container-low/70">
              <tr>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70">Mã đơn</th>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70">Sân</th>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70">Ngày chơi</th>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70">Ca chơi</th>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70">Tổng tiền</th>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70 text-center">Trạng thái</th>
                <th class="px-4 py-4 text-xs font-bold uppercase tracking-wider opacity-70 text-right">Thao tác</th>
              </tr>
            </thead>
            <tbody id="bookingList" class="divide-y divide-outline-variant/20"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/ui/nav.js"></script>
  <script type="module" src="js/pages/my-bookings.js"></script>
</body>
</html>

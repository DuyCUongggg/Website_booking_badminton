<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Galaxy Badminton</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed": "#78fc9c",
            "on-primary-fixed-variant": "#005225",
            "on-error": "#ffffff",
            "on-tertiary-container": "#fffbff",
            "secondary-fixed": "#dde4e6",
            secondary: "#586062",
            "on-primary": "#ffffff",
            "surface-container-high": "#ebe7e7",
            "surface-dim": "#dcd9d9",
            "on-surface": "#1c1b1b",
            "surface-container-highest": "#e5e2e1",
            "on-secondary-fixed-variant": "#41484a",
            outline: "#6d7b6d",
            "surface-bright": "#fcf9f8",
            "on-secondary": "#ffffff",
            "surface-container-low": "#f6f3f2",
            surface: "#fcf9f8",
            primary: "#006b32",
            "on-primary-container": "#f7fff3",
            "on-secondary-container": "#5d6466",
            "tertiary-fixed-dim": "#ffb2bb",
            "secondary-container": "#dae1e3",
            "on-tertiary-fixed": "#400012",
            "secondary-fixed-dim": "#c1c8ca",
            "on-background": "#1c1b1b",
            "inverse-primary": "#5adf82",
            error: "#ba1a1a",
            "tertiary-fixed": "#ffd9dd",
            "tertiary-container": "#c84761",
            "on-primary-fixed": "#00210b",
            "on-tertiary-fixed-variant": "#8a1636",
            "on-secondary-fixed": "#161d1f",
            "surface-variant": "#e5e2e1",
            "surface-container": "#f0edec",
            "on-tertiary": "#ffffff",
            "inverse-on-surface": "#f3f0ef",
            "primary-container": "#008740",
            "on-error-container": "#93000a",
            background: "#fcf9f8",
            "error-container": "#ffdad6",
            "surface-container-lowest": "#ffffff",
            tertiary: "#a72e4a",
            "outline-variant": "#bccabb",
            "on-surface-variant": "#3d4a3e",
            "primary-fixed-dim": "#5adf82",
            "surface-tint": "#006d33",
            "inverse-surface": "#313030"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          fontFamily: {
            headline: ["Lexend", "sans-serif"],
            body: ["Inter", "sans-serif"],
            label: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: "Inter", sans-serif; }
    h1, h2, h3, .font-lexend { font-family: "Lexend", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-[520px] bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-[0px_20px_40px_rgba(28,27,27,0.06)] flex flex-col gap-8">
      <div class="flex flex-col gap-2 text-center md:text-left">
        <h1 class="text-3xl font-black text-on-surface tracking-tight font-lexend">Galaxy Badminton</h1>
        <p class="text-on-surface-variant font-label text-sm uppercase tracking-widest opacity-70">Bắt đầu hành trình của bạn</p>
      </div>

      <p class="text-sm text-amber-900/90 bg-amber-50 border border-amber-200/80 rounded-xl px-4 py-3 leading-relaxed">
        Bản demo: đăng ký chỉ lưu trên trình duyệt này (local), không gửi máy chủ và không lưu database.
      </p>

      <form id="registerForm" class="flex flex-col gap-5" method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col gap-1.5 md:col-span-2">
            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1" for="hoTen">Họ và tên</label>
            <input id="hoTen" name="hoTen" type="text" placeholder="Nguyễn Văn A" class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all placeholder:text-on-surface-variant/40" required>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1" for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="example@gmail.com" class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all placeholder:text-on-surface-variant/40" required>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1" for="soDienThoai">Số điện thoại</label>
            <input id="soDienThoai" name="soDienThoai" type="tel" placeholder="0901234567" class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all placeholder:text-on-surface-variant/40" required>
          </div>

          <div class="flex flex-col gap-1.5 md:col-span-2">
            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1" for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all placeholder:text-on-surface-variant/40" minlength="8" required>
          </div>
        </div>

        <div class="flex items-center gap-3 px-1 mt-2">
          <input id="terms" type="checkbox" class="rounded border-outline-variant text-primary focus:ring-primary" required>
          <label class="text-xs text-on-surface-variant leading-tight" for="terms">
            Tôi đồng ý với <a class="text-primary font-bold hover:underline" href="#">Điều khoản dịch vụ</a> và <a class="text-primary font-bold hover:underline" href="#">Chính sách bảo mật</a>.
          </label>
        </div>

        <button class="mt-4 w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
          Đăng ký
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </form>

      <div class="flex flex-col items-center gap-4 border-t border-outline-variant/10 pt-6">
        <p class="text-sm text-on-surface-variant">
          Đã có tài khoản?
          <a class="text-primary font-bold hover:underline ml-1" href="login.html">Đăng nhập</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="w-full py-8 mt-auto border-t border-stone-200/20 bg-stone-50">
    <div class="flex flex-col md:flex-row justify-between items-center px-8 gap-4 max-w-7xl mx-auto">
      <p class="text-xs uppercase tracking-widest text-stone-500">© 2024 Galaxy Badminton. Thiết kế cho hiệu suất tối đa.</p>
      <div class="flex gap-6">
        <a class="text-xs uppercase tracking-widest text-stone-500 hover:text-green-600 transition-all opacity-80 hover:opacity-100" href="#">Điều khoản dịch vụ</a>
        <a class="text-xs uppercase tracking-widest text-stone-500 hover:text-green-600 transition-all opacity-80 hover:opacity-100" href="#">Chính sách bảo mật</a>
        <a class="text-xs uppercase tracking-widest text-stone-500 hover:text-green-600 transition-all opacity-80 hover:opacity-100" href="#">Trung tâm hỗ trợ</a>
      </div>
    </div>
  </footer>

  <script type="module" src="js/pages/register.js"></script>
</body>
</html>

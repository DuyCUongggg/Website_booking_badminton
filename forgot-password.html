<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu | Galaxy Badminton</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            surface: "#fcf9f8",
            "on-primary-fixed-variant": "#005225",
            error: "#ba1a1a",
            outline: "#6d7b6d",
            "tertiary-fixed-dim": "#ffb2bb",
            "secondary-fixed": "#dde4e6",
            "secondary-fixed-dim": "#c1c8ca",
            "inverse-surface": "#313030",
            "surface-bright": "#fcf9f8",
            "on-surface-variant": "#3d4a3e",
            "primary-container": "#008740",
            "surface-dim": "#dcd9d9",
            "inverse-primary": "#5adf82",
            primary: "#006b32",
            "outline-variant": "#bccabb",
            "on-background": "#1c1b1b",
            "on-tertiary": "#ffffff",
            "surface-container-low": "#f6f3f2",
            "on-error-container": "#93000a",
            "surface-container-lowest": "#ffffff",
            "primary-fixed-dim": "#5adf82",
            "secondary-container": "#dae1e3",
            "on-tertiary-fixed": "#400012",
            "on-primary-container": "#f7fff3",
            "surface-tint": "#006d33",
            "on-surface": "#1c1b1b",
            "tertiary-container": "#c84761",
            tertiary: "#a72e4a",
            "on-secondary": "#ffffff",
            "inverse-on-surface": "#f3f0ef",
            secondary: "#586062",
            "surface-container-highest": "#e5e2e1",
            "surface-container": "#f0edec",
            background: "#fcf9f8",
            "on-secondary-fixed-variant": "#41484a",
            "surface-container-high": "#ebe7e7",
            "on-primary": "#ffffff",
            "error-container": "#ffdad6",
            "on-secondary-container": "#5d6466",
            "on-tertiary-fixed-variant": "#8a1636",
            "on-secondary-fixed": "#161d1f",
            "on-error": "#ffffff",
            "primary-fixed": "#78fc9c",
            "on-primary-fixed": "#00210b",
            "surface-variant": "#e5e2e1",
            "tertiary-fixed": "#ffd9dd",
            "on-tertiary-container": "#fffbff"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          fontFamily: {
            headline: ["Lexend", "sans-serif"],
            body: ["Inter", "sans-serif"],
            label: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .kinetic-gradient {
      background: linear-gradient(135deg, #006b32 0%, #008740 100%);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute inset-0 z-0 pointer-events-none opacity-40">
    <div class="absolute top-[-10%] right-[-5%] w-96 h-96 rounded-full bg-primary-fixed-dim blur-[100px]"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-80 h-80 rounded-full bg-tertiary-fixed blur-[80px]"></div>
  </div>

  <div class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40"></div>

  <div class="relative z-50 w-full max-w-md bg-surface-container-lowest rounded-full shadow-[0px_20px_40px_rgba(28,27,27,0.06)] overflow-hidden">
    <div class="relative h-32 w-full overflow-hidden">
      <div class="absolute inset-0 kinetic-gradient opacity-90"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-on-primary font-headline text-2xl font-black tracking-tighter">Galaxy Badminton</span>
      </div>
      <img alt="Nền sân cầu lông" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-30" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNHK1hJUHzjzCcaEcx4ehgRBWDsL6IhAuEbB_nXCffjyUbo8pDPwvzHppKN3Sw786mTWA713sysbSKI-HnW7lnMhyVCDOw7gslRGfXYPuAjcA8tUIJwtXbHduCMDTgaSfcNs6C7XaTfU2kORiUWVrBTUogMqF__W_AW2J_d0qBFM1dyM__wTRuaYbV6gPojKh4k5k454LgWy7d3KvOzTbowv_47gLscZa7I-0Qyz_Lu_Y8vkR-dEeZlyUdrKjtEv98tb70ct0hR1zw">
    </div>

    <div class="px-8 pt-8 pb-10">
      <header class="mb-8">
        <h1 class="font-headline text-3xl font-bold text-on-surface tracking-tight mb-2">Quên mật khẩu</h1>
        <p class="text-on-surface-variant text-sm leading-relaxed">Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu.</p>
      </header>

      <form id="forgotPasswordForm" class="space-y-6">
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">Địa chỉ email</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
            </div>
            <input id="email" name="email" type="email" required placeholder="example@galaxybadminton.vn" class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-200">
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full kinetic-gradient text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group">
            Gửi yêu cầu
            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-outline-variant/20 text-center">
        <a class="inline-flex items-center gap-2 text-primary font-bold text-sm hover:underline decoration-2 underline-offset-4 active:scale-95 transition-all" href="login.html">
          <span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
          Quay lại đăng nhập
        </a>
      </div>
    </div>

    <div class="bg-surface-container-low px-8 py-4 flex justify-between items-center">
      <div class="flex gap-4">
        <span class="material-symbols-outlined text-outline text-lg">sports_tennis</span>
        <span class="material-symbols-outlined text-outline text-lg">speed</span>
      </div>
      <span class="font-headline text-[10px] font-black text-outline uppercase tracking-widest">Security Protocol v2.4</span>
    </div>
  </div>

  <script type="module" src="js/pages/forgot-password.js"></script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết đặt sân | Galaxy Badminton</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#006b32", surface: "#fcf9f8", "on-surface": "#1c1b1b", "surface-container-low": "#f6f3f2", "surface-container-lowest": "#ffffff", "outline-variant": "#bccabb", tertiary: "#a72e4a" },
          fontFamily: { headline: ["Lexend", "sans-serif"], body: ["Inter", "sans-serif"] }
        }
      }
    };
  </script>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
  <header class="bg-surface flex justify-between items-center w-full px-8 py-4 fixed top-0 z-50 border-b border-outline-variant/20">
    <div class="flex items-center gap-8">
      <a href="index.html" class="text-2xl font-black tracking-tighter uppercase font-headline">Galaxy Badminton</a>
      <nav id="mainNav" class="hidden md:flex gap-6 items-center"></nav>
    </div>
    <div id="headerAuth" class="flex items-center gap-2 shrink-0"></div>
  </header>

  <main class="pt-24 pb-12 px-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-8 space-y-8">
        <section class="bg-surface-container-low rounded-xl p-8 overflow-hidden relative">
          <span class="text-xs font-bold uppercase tracking-widest text-primary mb-2 block">Thông tin đặt sân</span>
          <h2 id="courtTitle" class="text-4xl font-black text-on-surface mb-6 font-headline tracking-tight">-</h2>
          <div class="flex flex-wrap gap-8">
            <div>
              <p class="text-xs text-gray-500 font-medium">NGÀY</p>
              <p id="dateLabel" class="font-headline font-bold text-lg">-</p>
            </div>
            <div>
              <p class="text-xs text-gray-500 font-medium">CA CHƠI</p>
              <p id="slotLabel" class="font-headline font-bold text-lg">-</p>
            </div>
          </div>
        </section>

        <section>
          <h3 class="text-2xl font-bold font-headline">Dịch vụ phụ</h3>
          <p class="text-sm text-gray-500">Chọn thêm dịch vụ trước khi sang thanh toán.</p>
          <div id="serviceList" class="space-y-4 mt-4"></div>
        </section>
      </div>

      <div class="lg:col-span-4">
        <div class="sticky top-24 bg-white rounded-xl p-6 shadow-[0px_20px_40px_rgba(28,27,27,0.06)] border border-outline-variant/20">
          <h3 class="text-xl font-bold font-headline mb-6 pb-4 border-b border-gray-200">Tóm tắt đơn</h3>
          <div id="summaryBlock" class="space-y-4 mb-8 text-sm"></div>
          <div class="pt-6 border-t border-gray-200 space-y-6">
            <div class="flex justify-between items-end">
              <div>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Tổng thanh toán</p>
                <p id="totalAmount" class="text-3xl font-black text-primary font-headline leading-none mt-1">0đ</p>
              </div>
            </div>
            <button id="payBtn" class="w-full bg-primary text-white py-4 rounded-xl font-headline font-bold text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
              <span>Tiếp tục thanh toán</span>
            </button>
            <button id="cancelBtn" type="button" class="w-full py-3 rounded-xl bg-red-600 text-white font-bold uppercase tracking-wider text-xs">Hủy đơn</button>
            <a href="my-bookings.html" class="block text-center text-sm font-semibold text-primary">Quay lại danh sách đơn</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/ui/nav.js"></script>
  <script type="module" src="js/pages/booking-detail.js"></script>
</body>
</html>

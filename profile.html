<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin cá nhân | Galaxy Badminton</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#006b32",
            surface: "#fcf9f8",
            "on-surface": "#1c1b1b",
            "surface-container-low": "#f6f3f2",
            "surface-container-lowest": "#ffffff",
            "surface-container-high": "#ebe7e7",
            "outline-variant": "#bccabb",
            tertiary: "#a72e4a",
            secondary: "#586062"
          },
          fontFamily: {
            headline: ["Lexend", "sans-serif"],
            body: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
  <header class="bg-surface flex justify-between items-center w-full px-8 py-4 fixed top-0 z-50 border-b border-outline-variant/20">
    <div class="flex items-center gap-8">
      <a href="index.html" class="text-2xl font-black tracking-tighter uppercase font-headline">Galaxy Badminton</a>
      <nav id="mainNav" class="hidden md:flex gap-6 items-center"></nav>
    </div>
    <div id="headerAuth" class="flex items-center gap-2 shrink-0"></div>
  </header>

  <main class="pt-24 pb-12 px-6 md:px-12 max-w-6xl mx-auto">
    <header class="mb-12">
      <h1 class="text-4xl md:text-5xl font-black text-on-surface tracking-tighter uppercase mb-2">Thông tin cá nhân</h1>
      <div class="h-1.5 w-24 bg-primary rounded-full"></div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
      <section class="md:col-span-4 bg-surface-container-lowest p-8 rounded-3xl shadow-[0px_20px_40px_rgba(28,27,27,0.04)] flex flex-col items-center text-center">
        <div class="relative group">
          <img alt="Ảnh đại diện" class="w-40 h-40 rounded-full border-4 border-surface-container-high transition-transform duration-300 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcDB4uF-CDNdBsBdZs9wJ-sJ2YHSn9yaYkfpz9_MG6AbEpopZdeltEf_n0o9Zm7jwVgSRcpzlAZ7pxYdk3nxXvhFcfKs8wjsAzBDePGD1tulDCELi93mZceh4bFvTQOpwr0GFSyd53skh8go_7ckKeESLk3L6D1LgxixgyyZnKEI4YUFqylmU-gAAgnOYJ_kQIR-Erx-RIlQ2ycTaAX5lTkkhVOPfzBTl6cuwz2octcPtAbywu8uDILwu9Giom9XXcgXjoxbl-1YbH">
        </div>
        <h2 id="profileNameLabel" class="mt-6 text-2xl font-extrabold text-on-surface font-headline uppercase tracking-tight">-</h2>
        <p id="profileTierLabel" class="text-primary font-semibold tracking-widest text-xs uppercase mb-8">Thành viên</p>
        <div class="w-full space-y-4 pt-6 border-t border-outline-variant/20">
          <div class="flex justify-between items-center text-sm">
            <span class="text-on-surface-variant font-medium">Mã khách hàng</span>
            <span id="maKhachHangLabel" class="font-headline font-bold text-on-surface">-</span>
          </div>
          <div class="flex justify-between items-center text-sm">
            <span class="text-on-surface-variant font-medium">Điểm tích lũy</span>
            <span id="diemTichLuyLabel" class="font-headline font-bold text-primary">-</span>
          </div>
        </div>
      </section>

      <section class="md:col-span-8 bg-surface-container-low p-8 md:p-10 rounded-3xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-2">
            <label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70 ml-1">Họ và tên</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">person</span>
              <input id="hoTenInput" class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/40 font-medium text-on-surface transition-all" type="text">
            </div>
          </div>
          <div class="space-y-2">
            <label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70 ml-1">Số điện thoại</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">call</span>
              <input id="soDienThoaiInput" class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/40 font-medium text-on-surface transition-all" type="tel">
            </div>
          </div>
          <div class="md:col-span-2 space-y-2">
            <label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70 ml-1">Email</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
              <input id="emailInput" class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/40 font-medium text-on-surface transition-all" type="email">
            </div>
          </div>
          <div class="md:col-span-2 space-y-2">
            <label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/70 ml-1">Hạng thành viên</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">military_tech</span>
              <input id="hangThanhVienInput" class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/40 font-medium text-on-surface transition-all" type="text" disabled>
            </div>
          </div>
        </div>

        <div class="mt-12 flex flex-col sm:flex-row gap-4">
          <button id="saveProfileBtn" class="flex-1 bg-primary text-white font-bold py-5 rounded-xl hover:opacity-90 transition-all flex items-center justify-center space-x-3 shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined">save</span>
            <span>Cập nhật thông tin</span>
          </button>
          <button id="changePasswordBtn" class="px-8 bg-surface-container-highest text-on-surface font-bold py-5 rounded-xl hover:bg-surface-container-high transition-all flex items-center justify-center space-x-3">
            <span class="material-symbols-outlined">lock_reset</span>
            <span>Đổi mật khẩu</span>
          </button>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="js/ui/nav.js"></script>
  <script type="module" src="js/pages/profile.js"></script>
</body>
</html>
